name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # CI, maven bygger og tester når der oprettes en pull request
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean verify -B
  # Docker bygger og pusher image af root contents til ghcr
  build-and-push-image:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCRñ
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/anoepus/todo-app:latest
            ghcr.io/anoepus/todo-app:${{ github.sha }}
  # Docker bygger og pusher image af frontend mappen til ghcr
  build-and-push-frontend:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/anoepus/todo-app-frontend:latest
            ghcr.io/anoepus/todo-app-frontend:${{ github.sha }}

  deploy:
    needs: [build-and-push-image, build-and-push-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle VM #Deployer til oracle VM
        uses: appleboy/ssh-action@v1.0.0 #Bruges til at SSH ind i vores VM
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # køre script når actions har SSH'et ind i VM
          script: |
            cd ~/todo-app
            
            # Puller nyeste images til at compose i prod
            docker compose -f docker-compose.prod.yml pull
            
            # Restarter compose (containere) med de nyeste images
            docker compose -f docker-compose.prod.yml up -d
            
            # Fjerner gamle images (clean up)
            docker image prune -f